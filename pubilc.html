<template>

  <div class="chat-page">
    <span class="thinking">思考中...</span>
    <div class="reply-box">
      reply: {{ reply }}

    </div>



    <div v-if="images.length" class="image-list">

      <div v-for="(image, index) in images" :key="index" class="image-item">

        <img :src="image.dataUrl" alt="pasted image">

        <button type="button" class="remove-btn" @click="removeImage(index)">x</button>

      </div>

    </div>



    <textarea v-model="question" class="question-input" :disabled="loading" placeholder="输入文字，或 Ctrl+V 粘贴图片" rows="4"
      @paste="handlePaste" @keydown.enter.exact.prevent="sendMessage" />



    <button :disabled="loading || !canSend" @click="sendMessage">

      {{ loading ? 'sending...' : 'send' }}

    </button>

  </div>

</template>

<script>

import { mapGetters, mapActions } from 'vuex'

import { mapMutations } from 'vuex/dist/vuex.common.js';

export default {

  name: 'Index',

  data() {

    return {

      msg: 'Index',

      question: '',

      reply: '',

      images: [],

      loading: false,

      apiKey: 'sk-ws-H.REYHLEL.qYFZ.MEUCIQC2HVlBVcQK0jG2RaWH4e9dd0CVD3o0b36ZzPebYt4JTgIgWGTv3dMgbhiz5pVWzW0mtvAbMo85cyiidFzeaLQ84s4',

      model: 'qwen3.7-plus'

    }

  },

  computed: {

    ...mapGetters('user', ['getName']),

    canSend() {

      return Boolean(this.question.trim() || this.images.length)

    }

  },

  methods: {

    ...mapMutations('user', ['setName']),

    handleClick() {

      this.$router.push({ name: 'User' })

      this.setName('newName')

      console.log(this.msg)

    },

    handlePaste(event) {

      const items = event.clipboardData && event.clipboardData.items

      if (!items) {

        return

      }



      for (let i = 0; i < items.length; i++) {

        const item = items[i]

        if (item.type.indexOf('image') !== 0) {

          continue

        }



        event.preventDefault()

        const file = item.getAsFile()

        if (!file) {

          return

        }



        const reader = new FileReader()

        reader.onload = (loadEvent) => {

          this.images.push({

            dataUrl: loadEvent.target.result

          })

        }

        reader.readAsDataURL(file)

        return

      }

    },

    removeImage(index) {

      this.images.splice(index, 1)

    },

    buildUserContent() {

      const text = this.question.trim()



      if (!this.images.length) {

        return text

      }



      const content = []

      if (text) {

        content.push({ type: 'text', text })

      }

      this.images.forEach((image) => {

        content.push({

          type: 'image_url',

          image_url: { url: image.dataUrl }

        })

      })

      return content

    },

    async sendMessage() {

      const content = this.buildUserContent()

      if (!content || this.loading) {

        return

      }



      this.loading = true

      this.reply = ''



      try {

        const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {

          method: 'POST',

          headers: {

            'Content-Type': 'application/json',

            Authorization: `Bearer ${this.apiKey}`

          },

          body: JSON.stringify({

            model: this.model,

            messages: [

              {

                role: 'system',

                content: '请使用纯文本回答，禁止 Markdown 格式以及 ** 加粗、# 标题、代码块、列表符号等格式，保留关键词和句子结构。'

              },

              { role: 'user', content }

            ],

            max_tokens: 1024

          })

        })



        const data = await response.json()



        if (!response.ok) {

          this.reply = data.error?.message || data.message || '请求失败'

          return

        }



        this.reply = (data.choices?.[0]?.message?.content || '')

          .replace(/\*\*/g, '')

          .replace(/`/g, '')

          .replace(/^#+\s*/gm, '')



        this.question = ''

        this.images = []

      } finally {

        this.loading = false

      }

    }

  }

}

</script>
